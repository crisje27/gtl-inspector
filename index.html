<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0055A4" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GTL Inspector" />
  <meta name="description" content="Sistema de inspección E&I para obras YPF Upstream — GRUPO TERGO LAF" />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/views.css" />

  <title>GTL Inspector — YPF E&I</title>
</head>
<body>

<!-- Splash -->
<div id="splash" class="splash">
  <div class="logo">
    GTL <span class="yelo">●</span> INSPECTOR
  </div>
  <div class="tag">Sistema de inspección E&amp;I — YPF Upstream</div>
</div>

<!-- App shell -->
<div id="app" class="hidden">

  <!-- TopBar -->
  <header class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <div>
        GTL INSPECTOR
        <small id="topbarObra">Sin obra activa</small>
      </div>
    </div>
    <div class="spacer"></div>
    <div class="conn" id="connStatus" title="Estado de conexión">
      <span class="dot"></span>
      <span class="lbl">Online</span>
    </div>
  </header>

  <!-- Main view (router renderiza aquí) -->
  <main id="view" class="view"></main>

  <!-- Bottom nav -->
  <nav class="bottomnav">
    <button class="tab" data-route="/home" type="button">
      <span class="ic">⌂</span>
      <span>Inicio</span>
    </button>
    <button class="tab" data-route="/form" type="button">
      <span class="ic">＋</span>
      <span>Cargar</span>
    </button>
    <button class="tab" data-route="/dashboard" type="button">
      <span class="ic">▦</span>
      <span>Dashboard</span>
    </button>
    <button class="tab" data-route="/more" type="button">
      <span class="ic">⋯</span>
      <span>Más</span>
    </button>
  </nav>

  <!-- Toasts -->
  <div id="toastStack" class="toast-stack"></div>

</div>

<!-- Modal placeholder -->
<div id="modalRoot"></div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>

<!-- App scripts (carga ordenada).
     OJO con el orden: app.js define GTL.UI y debe cargar
     ANTES que los views, que capturan GTL.UI al evaluar su IIFE. -->
<script src="js/store.js" defer></script>
<script src="js/sync.js" defer></script>
<script src="js/lib/chart-helpers.js" defer></script>
<script src="js/app.js" defer></script>
<script src="js/views/setup.js" defer></script>
<script src="js/views/form.js" defer></script>
<script src="js/views/dashboard.js" defer></script>
<script src="js/views/settings.js" defer></script>

</body>
</html>
